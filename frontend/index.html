<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solomon — The people behind every job posting</title>
    <meta
      name="description"
      content="For every job you're targeting: the recruiter, the hiring manager, and a peer — with evidence for why they're right, a warm path from your own network, a safe email, and a drafted message. Nothing sends without you."
    />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the persisted (or system) theme before first paint to avoid a
      // light-mode flash. Kept in sync with src/stores/theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem('nexusreach-theme');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* default to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
