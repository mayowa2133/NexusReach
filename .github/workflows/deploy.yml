name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: CI must pass before deploy
        run: echo "Deploy will only run after CI jobs succeed"

  deploy-backend:
    name: Deploy Backend (Railway)
    needs: [ci-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ vars.RAILWAY_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [ci-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  post-deploy:
    name: Run Migrations
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head
        env:
          NEXUSREACH_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          NEXUSREACH_AUTH_MODE: supabase
          NEXUSREACH_SUPABASE_URL: ${{ secrets.NEXUSREACH_SUPABASE_URL }}
          NEXUSREACH_SUPABASE_KEY: ${{ secrets.NEXUSREACH_SUPABASE_KEY }}
          NEXUSREACH_SUPABASE_JWT_SECRET: ${{ secrets.NEXUSREACH_SUPABASE_JWT_SECRET }}
