name: Security gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:be01cf82fc7dbba824acf0a82e150b4b360f3ff93c6631d7844af431e841a95c
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexusreach_security
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d nexusreach_security"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      NEXUSREACH_ENVIRONMENT: test
      NEXUSREACH_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/nexusreach_security
      NEXUSREACH_REDIS_URL: redis://127.0.0.1:6379/15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install hash-locked backend and security tools
        working-directory: backend
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install pip-audit==2.10.0 bandit==1.8.6 semgrep==1.169.0

      - name: Dependency audits
        run: |
          pip-audit --no-deps --disable-pip -r backend/requirements.lock
          pip-audit --no-deps --disable-pip --format cyclonedx-json --output backend-python.cdx.json -r backend/requirements.lock
          npm audit --omit=dev --prefix frontend
          npm audit --omit=dev --prefix e2e

      - name: Static security analysis
        run: |
          bandit -q -lll -r backend/app
          semgrep scan --error --config .semgrep.yml backend/app extension

      - name: Secret scan of current tree
        run: |
          curl -fsSLO https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_checksums.txt | grep 'gitleaks_8.28.0_linux_x64.tar.gz' | sha256sum -c -
          tar -xzf gitleaks_8.28.0_linux_x64.tar.gz gitleaks
          ./gitleaks dir . --redact --no-banner

      - name: Verify migrated database RLS
        working-directory: backend
        run: |
          python -m alembic upgrade head
          python scripts/verify_rls.py

      - name: Build hardened runtime images
        run: |
          docker build -t nexusreach-api:security ./backend
          docker build -f backend/Dockerfile.renderer -t nexusreach-renderer:security backend

      - name: Verify runtime container policy
        run: |
          docker run --rm nexusreach-api:security sh -c \
            'test "$(id -u)" != 0 && ! command -v gcc && ! command -v pdflatex'
          docker run --rm --entrypoint sh nexusreach-renderer:security -c \
            'test "$(id -u)" != 0 && command -v pdflatex >/dev/null'

      - name: Scan runtime images
        run: |
          curl -fsSLO https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_Linux-64bit.tar.gz
          curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_checksums.txt | grep 'trivy_0.72.0_Linux-64bit.tar.gz' | sha256sum -c -
          tar -xzf trivy_0.72.0_Linux-64bit.tar.gz trivy
          # Python dependencies are audited above; image scans gate the OS
          # package surface without downloading unrelated Java advisory data.
          ./trivy image --scanners vuln --pkg-types os --ignore-unfixed --severity HIGH,CRITICAL --exit-code 1 nexusreach-api:security
          ./trivy image --scanners vuln --pkg-types os --ignore-unfixed --severity HIGH,CRITICAL --exit-code 1 nexusreach-renderer:security

      - name: Generate and validate CycloneDX SBOMs
        run: |
          # The lock-derived SBOM covers Python libraries. OS-only image SBOMs
          # avoid Trivy's unrelated 900 MB Java advisory DB for TeX support JARs.
          ./trivy image --offline-scan --pkg-types os --format cyclonedx --output nexusreach-api.cdx.json nexusreach-api:security
          ./trivy image --offline-scan --pkg-types os --format cyclonedx --output nexusreach-renderer.cdx.json nexusreach-renderer:security
          python - <<'PY'
          import json
          from pathlib import Path

          for name in (
              "backend-python.cdx.json",
              "nexusreach-api.cdx.json",
              "nexusreach-renderer.cdx.json",
          ):
              document = json.loads(Path(name).read_text())
              assert document.get("bomFormat") == "CycloneDX", name
              assert document.get("components"), name
          PY
