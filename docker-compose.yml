services:
  searxng:
    build:
      context: ./deploy/searxng
      dockerfile: Dockerfile
    image: nexusreach-searxng:2026.7.11
    container_name: nexusreach-searxng
    environment:
      # The official entrypoint replaces the committed ultrasecretkey
      # placeholder with this value. Fail configuration early instead of
      # allowing the service to crash-loop with the unsafe placeholder.
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET to a long random value}
    ports:
      - "8888:8080"
    volumes:
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
      - /var/cache:size=32m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    restart: unless-stopped
