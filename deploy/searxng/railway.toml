# Railway service config for the SearXNG metasearch engine.
#
# Create a new Railway service in the NexusReach project, set its root directory
# to `deploy/searxng`, and point its config file path at `/deploy/searxng/railway.toml`.
# Railway builds the Dockerfile in this directory (which bakes in settings.yml),
# so no volume mount is needed. See DEPLOYMENT_RUNBOOK.md > SearXNG for the full
# recipe (SEARXNG_SECRET, private URL wiring, limiter/429 note).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No HTTP healthcheck: this is a private (unexposed) service and the SearXNG
# image binds a fixed port 8080 (it ignores Railway's $PORT), so Railway's
# $PORT-based healthcheck probes the wrong port and never passes. The backend
# reaches it directly over the private network at
# `nexusreach-searxng.railway.internal:8080`, which does not depend on a
# healthcheck. Railway marks the deploy healthy once the container starts.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
