                - generic [ref=e6756]: "<div class=\"content-intro\"><h3><span style=\"font-weight: 400;\"><strong>About AppLovin</strong></span></h3> <p>AppLovin makes technologies that help businesses of every size connect to their ideal customers. The company provides end-to-end software and AI solutions for businesses to reach, monetize and grow their global audiences. For more information about AppLovin, visit: <a href=\"http://www.applovin.com/\">www.applovin.com</a>.</p> <p><span style=\"font-weight: 400;\">To deliver on this mission, our global team is composed of team members with life experiences, backgrounds, and perspectives that mirror our developers and customers around the world. At AppLovin, we are intentional about the team and culture we are building, seeking candidates who are outstanding in their own right and also demonstrate their support of others.</span></p> <p>Fortune recognizes AppLovin as one of the Best Workplaces in the Bay Area, and the company has been a Certified Great Place to Work for the last four years (2021-2024). Check out the rest of our awards <a href=\"https://www.applovin.com/jobs/\">HERE</a>.</p></div><h3><b>A Day in the Life</b></h3><p><span>As a member of our backend software engineering team, you’ll solve technical challenges, including upgrading and implementing state-of-the-art software infrastructure. The team builds a high-performance, high availability, globally distributed ecosystem platform of services that in turn provide the foundation for rapid development of novel new systems that integrate into that ecosystem and improve it</span></p><p><span>Our backend systems handle billions of requests per day, and work on our mediation platform responsible for our header bidding solution, creating high-availability low-latency systems that are distributed across multiple data centers.&nbsp;</span></p><p><span>&nbsp;</span></p><h3><b>The Impact You’ll Make</b></h3><ul><li><p><span>Design, develop, and maintain large-scale distributed systems</span></p></li><li><p><span>Collaborate with various engineering teams to meet a wide range of technological challenges</span></p></li><li><p><span>Work closely with our product team to contribute and influence the roadmap of our products and technologies</span></p></li><li><p><span>Influence and inspire team members</span></p></li></ul><p><span>&nbsp;</span></p><h3><b>Who You Are</b></h3><ul><li><p><span>Have 0-2+ years of experience and a minimum of a BS and/or MS in Computer Science</span"
