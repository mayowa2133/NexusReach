[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'export NEXUSREACH_SERVICE_ROLE=api NEXUSREACH_RENDER_REMOTE_ENABLED=true; cd /app && python -m alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
