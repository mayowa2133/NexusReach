ible in live streaming monetization.&nbsp;</p> <p>Our team are based in San Francisco, CA and Seattle, WA</p> <h3><strong>You Will:</strong></h3> <ul> <li>Build robust ML infrastructure and platforms that power personalized monetization experiences across Twitch's ecosystem</li> <li>Architect and develop APIs that seamlessly integrate ML models with existing monetization services, enabling real-time and batch predictions at scale</li> <li>Collaborate with Applied Scientists to productionize ML models, transforming research into production-ready systems that serve milli
